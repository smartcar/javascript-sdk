- pipeline: Deploy to CDN
  refs:
  - refs/heads/master
  fail_on_prepare_env_warning: true
  actions:
  - action: Install Dependencies
    type: BUILD
    execute_commands:
    - npm ci
    shell: BASH
    docker_image_name: library/node
    docker_image_tag: 20
  - action: Build and Publish to CDN
    type: AWS_CLI_2
    integration: aws-ios-sdk
    shell: BASH
    setup_commands:
    - apt-get update || true
    - apt-get install -y curl xz-utils jq git
    - curl -fsSL https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.xz -o /tmp/node-v20.19.0-linux-x64.tar.xz
    - tar -xJf /tmp/node-v20.19.0-linux-x64.tar.xz -C /usr/local --strip-components=1
    - git --version
    - node --version
    - npm --version
    execute_commands:
    - npx gulp build:cdn
    - npx gulp publish:cdn
    region: us-west-2
