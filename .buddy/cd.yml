- pipeline: "CD"
  events:
  - type: PUSH
    refs:
    - refs/heads/master
  fail_on_prepare_env_warning: true
  actions:
  - action: "Install Dependencies"
    type: "BUILD"
    docker_image_name: "library/node"
    docker_image_tag: "20"
    execute_commands:
    - "npm ci"
    volume_mappings:
    - "/:/buddy/javascript-sdk"
    shell: "BASH"

  - action: "Publish Release"
    type: "AWS_CLI_2"
    docker_image_name: "library/node"
    docker_image_tag: "20"
    integration: "AWS_Production_Internal"
    region: "us-east-1"
    setup_commands:
    - "apt-get update || true"
    - "apt-get install -y jq"
    execute_commands:
    - "npx semantic-release --extends ./build/sr-configs/publish.js"
    volume_mappings:
    - "/:/buddy/javascript-sdk"
    shell: "BASH"
